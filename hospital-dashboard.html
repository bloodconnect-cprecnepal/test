<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard | Blood Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Reusing your existing CSS styles for consistency -->
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        .card { background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .input-group { margin-bottom: 1.25rem; }
        .input-label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 0.5rem; }
        .input-field { width: 100%; padding: 0.875rem 1rem; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; background: #1e293b; color: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(100px); transition: transform 0.4s; z-index: 1000; }
        .toast.show { transform: translateY(0); }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white"><i class="fas fa-hospital"></i></div>
                <h1 class="font-bold text-lg text-slate-800">Hospital Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm font-semibold text-slate-600"></span>
                <button onclick="App.logout()" class="text-sm text-red-600 font-bold hover:underline">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        
        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- Left: Post Request Form -->
            <div class="lg:col-span-1">
                <div class="card p-6 sticky top-24">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-blue-600"></i> New Request
                    </h2>
                    <form onsubmit="event.preventDefault(); App.createRequest();">
                        <div class="input-group">
                            <label class="input-label">Blood Type</label>
                            <select id="newType" class="input-field">
                                <option value="A+">A+</option><option value="O+">O+</option><option value="B+">B+</option><option value="AB+">AB+</option>
                                <option value="A-">A-</option><option value="O-">O-</option><option value="B-">B-</option><option value="AB-">AB-</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Units Needed</label>
                            <input type="number" id="newUnits" value="2" class="input-field" min="1">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Urgency</label>
                            <select id="newUrgency" class="input-field">
                                <option value="critical">Critical (Immediate)</option>
                                <option value="high">High (24 Hours)</option>
                                <option value="normal">Normal</option>
                            </select>
                        </div>
                        <button type="submit" id="btnPost" class="btn btn-primary w-full shadow-lg shadow-blue-500/20">
                            Post to Network
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right: My Requests List -->
            <div class="lg:col-span-2">
                <div class="card p-6 min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">My Active Requests</h2>
                        <button onclick="App.loadRequests()" class="text-sm text-blue-600 font-semibold hover:underline"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    
                    <div id="requestsList" class="space-y-4">
                        <!-- Requests will load here -->
                        <div class="text-center text-slate-400 py-10">Loading requests...</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast"><span id="toastMsg"></span></div>

    <script>
        // CONFIG - SAME AS MAIN FILE
        const CONFIG = {
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyFrRsw-Ru2PeQcfYgTZ0PdPMhwWE7ID-0cvxdl74blLNTwUn4Gd8bhwZmM1PwdGX1J/exec',
            DEBUG: true
        };

        // STATE
        const State = { user: null, myRequests: [] };

        // API LAYER - SAME LOGIC
        const API = {
            async post(action, data = {}) {
                if (!State.user) return { success: false, error: "Not logged in" };
                const payload = { action, ...data, userId: State.user.id, token: State.user.token };
                try {
                    const res = await fetch(CONFIG.SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await res.json();
                    return json;
                } catch (e) { return { success: false, error: e.message }; }
            }
        };

        // APP LOGIC
        const App = {
            init() {
                // Check Session from localStorage (set by index.html)
                const saved = localStorage.getItem('bc_session');
                if (!saved) {
                    window.location.href = 'index.html';
                    return;
                }
                State.user = JSON.parse(saved);
                
                // Render User Info
                document.getElementById('userName').textContent = State.user.name;
                
                // Load Data
                this.loadRequests();
            },

            async loadRequests() {
                const list = document.getElementById('requestsList');
                list.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></div>';
                
                // Get ALL requests (GS backend doesn't have a 'getMyRequests' yet, so we filter frontend)
                const res = await API.post('getSOS');
                
                if (res.success) {
                    // Filter only requests made by this hospital
                    State.myRequests = res.requests.filter(r => r.hospital === State.user.name).reverse();
                    this.renderList();
                } else {
                    list.innerHTML = `<div class="text-red-500 text-center">Error loading data</div>`;
                }
            },

            renderList() {
                const list = document.getElementById('requestsList');
                if (State.myRequests.length === 0) {
                    list.innerHTML = `<div class="text-center text-slate-400 py-10">No active requests found.</div>`;
                    return;
                }

                list.innerHTML = State.myRequests.map(r => `
                    <div class="p-4 border border-slate-100 rounded-xl flex justify-between items-center bg-slate-50 hover:bg-white transition-colors">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-slate-900 text-white text-xs font-bold px-2 py-1 rounded">${r.bloodType}</span>
                                <span class="text-sm font-bold text-slate-700">${r.units} Units</span>
                                <span class="text-[10px] uppercase font-bold ${r.urgency==='critical'?'text-red-600':'text-green-600'}">${r.urgency}</span>
                            </div>
                            <p class="text-xs text-slate-500">Posted: ${new Date(r.time).toLocaleDateString()}</p>
                        </div>
                        <div class="text-right">
                             <span class="block text-xs font-bold text-slate-400">ID: ${r.id.substring(4, 10)}</span>
                             <span class="block text-xs font-bold text-green-600 mt-1">${r.status}</span>
                        </div>
                    </div>
                `).join('');
            },

            async createRequest() {
                const btn = document.getElementById('btnPost');
                const original = btn.innerHTML;
                btn.innerHTML = '<span class="spinner"></span> Posting...';
                btn.disabled = true;

                const data = {
                    hospital: State.user.name,
                    bloodType: document.getElementById('newType').value,
                    units: document.getElementById('newUnits').value,
                    urgency: document.getElementById('newUrgency').value,
                    location: State.user.location || 'Kathmandu'
                };

                const res = await API.post('createSOS', data);
                
                btn.innerHTML = original;
                btn.disabled = false;

                if (res.success) {
                    this.showToast("Request Posted Successfully!", "success");
                    this.loadRequests(); // Refresh list
                } else {
                    this.showToast(res.error, "error");
                }
            },

            showToast(msg, type) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.className = `toast show ${type === 'error' ? 'bg-red-600' : 'bg-green-600'}`;
                setTimeout(() => t.classList.remove('show'), 3000);
            },

            logout() {
                localStorage.removeItem('bc_session');
                window.location.href = 'index.html';
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
